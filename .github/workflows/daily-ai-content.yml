name: Daily AI Content Generation

on:
  schedule:
    - cron: '0 8 * * *' # Every morning at 8:00 AM UTC
  workflow_dispatch: # Allow manual triggering for testing

jobs:
  generate-content:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install google-generativeai tavily-python requests

      - name: Configure Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Run Daily Content Script
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: python scripts/daily_content.py

      - name: Clean up on failure
        if: failure()
        run: |
          # Close any failed PRs or clean up branches if necessary
          echo "Pipeline failed. Please check logs."
